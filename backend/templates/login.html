<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePlatform - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.dark {
            background: linear-gradient(135deg, #0a0f1e 0%, #020409 100%);
        }

        /* Falling Keyboard Animation */
        .falling-key {
            position: fixed;
            top: -60px;
            font-size: 2rem;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.08);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: 0.2s;
        }

        body.dark .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .login-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.5s ease;
            border: 1px solid #e5e7eb;
            transition: background 0.3s ease, border 0.3s ease;
            position: relative;
            z-index: 2;
            margin: 0 auto;
        }

        body.dark .login-card {
            background: rgba(15, 25, 45, 0.95);
            border: 1px solid rgba(72, 187, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #000000, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        body.dark .logo {
            background: linear-gradient(135deg, #ffffff, #3bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }

        body.dark .subtitle {
            color: #8ba3c7;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            border-radius: 0.75rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
            color: #dc2626;
            font-size: 0.875rem;
        }

        body.dark .error-message {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            border-radius: 0.75rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
            color: #065f46;
            font-size: 0.875rem;
        }

        body.dark .success-message {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #34d399;
        }

        .input-group {
            margin: 1.25rem 0;
            text-align: left;
        }

        .input-group label {
            color: #374151;
            font-weight: 500;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        body.dark .input-group label {
            color: #b0c4ff;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            color: #111827;
            font-size: 1rem;
            transition: 0.2s;
        }

        body.dark .input-group input {
            background: rgba(10, 20, 35, 0.8);
            border: 1px solid #2c3e66;
            color: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        body.dark .input-group input:focus {
            border-color: #3bc9ff;
            box-shadow: 0 0 0 3px rgba(59, 201, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: #000000;
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        body.dark .btn {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
        }

        .btn:hover {
            background: #1f2937;
            transform: translateY(-1px);
        }

        body.dark .btn:hover {
            background: linear-gradient(135deg, #2563eb, #0891b2);
        }

        .signup-link {
            margin-top: 1.5rem;
            color: #6b7280;
            transition: color 0.3s ease;
        }

        body.dark .signup-link {
            color: #8ba3c7;
        }

        .signup-link a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
        }

        body.dark .signup-link a {
            color: #3bc9ff;
        }

        /* Developer Credit */
        .developer-credit {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            font-size: 0.75rem;
            color: #9ca3af;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        body.dark .developer-credit {
            border-top-color: #334155;
            color: #5a7a9e;
        }

        .developer-credit span {
            font-weight: 600;
            background: linear-gradient(135deg, #000, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        body.dark .developer-credit span {
            background: linear-gradient(135deg, #fff, #3bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>

    <div class="login-card">
        <div class="logo-icon">⌨️</div>
        <div class="logo">CodePlatform</div>
        <div class="subtitle">Login to continue coding</div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="{{ category }}-message">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Login →</button>
        </form>
        
        <div class="signup-link">
            New here? <a href="/signup">Create an account</a>
        </div>
        
        <div class="developer-credit">
            Developed by <span>B MARLIYA BANU</span>
        </div>
    </div>

    <script>
        // Falling keyboard animation
        const keyboardParts = ['⌨️', '🔘', '⏎', '⇧', '⌃', '⌥', '⌘', '🖱️', '◀', '▲', '▼', '▶', '␣', '⌫', '⌦', '⇪', '⎈', '⎆'];
        
        function createFallingKey() {
            const key = document.createElement('div');
            key.className = 'falling-key';
            key.textContent = keyboardParts[Math.floor(Math.random() * keyboardParts.length)];
            key.style.left = Math.random() * 100 + '%';
            key.style.animationDuration = (Math.random() * 3 + 2) + 's';
            key.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(key);
            setTimeout(() => key.remove(), 5000);
        }
        
        // Start falling animation
        setInterval(createFallingKey, 300);
        for (let i = 0; i < 15; i++) {
            setTimeout(createFallingKey, i * 100);
        }

        function toggleTheme() {
            const body = document.body;
            const toggleBtn = document.getElementById('themeToggle');
            
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                toggleBtn.textContent = '🌙';
            } else {
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.textContent = '☀️';
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = '☀️';
        }
    </script>
</body>
</html>
