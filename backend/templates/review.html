<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Platform - Write a Review</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020409);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(10, 20, 35, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #3bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links a {
            color: #b0c4ff;
            text-decoration: none;
            margin-left: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .review-card {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(72, 187, 255, 0.3);
            padding: 2rem;
        }

        .review-card h1 {
            color: white;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .problem-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }

        .problem-info p {
            color: #cbd5e6;
            margin: 0.5rem 0;
        }

        .problem-info strong {
            color: #3bc9ff;
        }

        .form-group {
            margin: 1.5rem 0;
        }

        label {
            color: #b0c4ff;
            font-weight: 500;
            display: block;
            margin-bottom: 0.5rem;
        }

        .rating {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .rating input {
            display: none;
        }

        .rating label {
            font-size: 2rem;
            cursor: pointer;
            color: #4a5568;
            transition: 0.2s;
        }

        .rating input:checked ~ label,
        .rating label:hover,
        .rating label:hover ~ label {
            color: #f59e0b;
        }

        .rating input:checked + label {
            color: #f59e0b;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(10, 20, 35, 0.8);
            border: 1px solid #2c3e66;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            min-height: 150px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #3bc9ff;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #3bc9ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">⌨️ Code Platform</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/problems">Problems</a>
            <a href="/progress">Progress</a>
            <a href="/leaderboard">Leaderboard</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="review-card">
            <h1>✍️ Write a Review</h1>

            <div class="problem-info">
                <p><strong>Problem {{ submission.problem_id }}:</strong> {{ submission.title }}</p>
                <p><strong>Difficulty:</strong> {{ submission.difficulty }}</p>
                <p><strong>Status:</strong> ✅ {{ submission.status|upper }}</p>
            </div>

            <form method="POST">
                <div class="form-group">
                    <label>⭐ Rate this problem (1-5 stars)</label>
                    <div class="rating">
                        <input type="radio" name="rating" value="5" id="star5" checked><label for="star5">★</label>
                        <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                        <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                        <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                        <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>💬 Your Review / Feedback</label>
                    <textarea name="comment" placeholder="Share your thoughts about this problem... Was it challenging? Did you learn something new?"></textarea>
                </div>

                <button type="submit" class="btn-submit">📤 Submit Review</button>
            </form>

            <a href="/progress" class="back-link">← Back to Progress</a>
        </div>
    </div>

    <style>
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .rating input {
            display: none;
        }
        .rating label {
            font-size: 2rem;
            cursor: pointer;
            color: #4a5568;
            transition: 0.2s;
        }
        .rating label:hover,
        .rating label:hover ~ label,
        .rating input:checked ~ label {
            color: #f59e0b;
        }
    </style>
</body>
</html>
