<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ problem.title }} - CodePlatform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',monospace;transition:all 0.3s;}
        body.white-theme{--bg-primary:#f8f9fa;--bg-secondary:#fff;--text-primary:#1a1a2e;--text-secondary:#4a4a6a;--card-bg:#fff;--border:#dee2e6;--accent:#3b82f6;--editor-bg:#1e1e1e;--editor-text:#d4d4d4;--navbar-bg:#fff;background:#f8f9fa;}
        body.black-theme{--bg-primary:#0a0a0a;--bg-secondary:#1a1a1a;--text-primary:#fff;--text-secondary:#a1a1aa;--card-bg:#111;--border:#2a2a2a;--accent:#60a5fa;--editor-bg:#0d0d0d;--editor-text:#4ade80;--navbar-bg:#111;background:#0a0a0a;}
        .navbar{background:var(--navbar-bg);padding:1rem 2rem;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem;}
        .logo{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .nav-links{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;}
        .nav-link{text-decoration:none;color:var(--text-secondary);font-weight:500;}
        .logout-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;padding:8px 20px;border-radius:8px;text-decoration:none;}
        .container{display:flex;height:calc(100vh - 70px);}
        .problem-panel{width:45%;padding:1.5rem;overflow-y:auto;background:var(--bg-primary);border-right:1px solid var(--border);}
        .editor-panel{width:55%;display:flex;flex-direction:column;}
        .difficulty{padding:4px 12px;border-radius:20px;font-size:0.8rem;display:inline-block;}
        .easy{background:#10b981;color:#fff;}.medium{background:#f59e0b;color:#fff;}.hard{background:#ef4444;color:#fff;}
        .example-box{background:var(--bg-secondary);padding:1rem;border-radius:10px;margin:1rem 0;border-left:3px solid var(--accent);}
        .language-selector{padding:1rem;background:var(--card-bg);border-bottom:1px solid var(--border);}
        select{padding:8px 12px;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;}
        textarea{width:100%;height:100%;padding:1rem;background:var(--editor-bg);color:var(--editor-text);border:none;font-family:monospace;font-size:14px;resize:none;}
        .actions{padding:1rem;display:flex;gap:1rem;border-top:1px solid var(--border);background:var(--card-bg);}
        .run-btn{background:#10b981;color:#fff;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;}
        .submit-btn{background:var(--accent);color:#fff;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;}
        .output{padding:1rem;background:var(--card-bg);border-top:1px solid var(--border);}
        pre{background:var(--editor-bg);padding:1rem;border-radius:8px;color:var(--editor-text);min-height:100px;}
        .theme-toggle{background:var(--bg-secondary);border:1px solid var(--border);font-size:1rem;cursor:pointer;padding:8px 16px;border-radius:8px;color:var(--text-primary);margin-left:auto;}
        @media (max-width:700px){.container{flex-direction:column;}.problem-panel,.editor-panel{width:100%;}}
    </style>
</head>
<body class="white-theme">
    <nav class="navbar">
        <div class="logo">⚡ CodePlatform</div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/problems" class="nav-link">Problems</a>
            <a href="/leaderboard" class="nav-link">Leaderboard</a>
            <a href="/progress" class="nav-link">Progress</a>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark Mode</button>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="problem-panel">
            <h1>{{ problem.title }}</h1>
            <span class="difficulty {{ problem.difficulty|lower }}">{{ problem.difficulty }}</span>
            <p style="margin:1rem 0;">{{ problem.description }}</p>
            <div class="example-box"><strong>📌 Example:</strong><br>{{ problem.example }}</div>
            <div class="example-box"><strong>⚠️ Constraints:</strong><br>{{ problem.constraints }}</div>
        </div>
        <div class="editor-panel">
            <div class="language-selector"><select id="language" onchange="changeLanguage()"><option value="python">🐍 Python</option><option value="javascript">📜 JavaScript</option><option value="java">☕ Java</option><option value="cpp">⚙️ C++</option></select></div>
            <form method="POST" action="/submit_code" id="codeForm" style="flex:1;display:flex;flex-direction:column;">
                <textarea id="code" name="code">{{ problem.starter_code.python }}</textarea>
                <input type="hidden" name="language" id="hiddenLanguage" value="python"><input type="hidden" name="problem_id" value="{{ problem.id }}">
                <div class="actions"><button type="button" class="run-btn" onclick="runCode()">▶ Run Code</button><button type="submit" class="submit-btn">✓ Submit</button></div>
            </form>
            <div class="output"><strong>Output:</strong><pre id="output">> Ready</pre></div>
        </div>
    </div>
    <script>
        const starterCodes={python:`{{ problem.starter_code.python|safe }}`,javascript:`{{ problem.starter_code.javascript|safe }}`,java:`{{ problem.starter_code.java|safe }}`,cpp:`{{ problem.starter_code.cpp|safe }}`};
        function changeLanguage(){let l=document.getElementById('language').value;document.getElementById('code').value=starterCodes[l];document.getElementById('hiddenLanguage').value=l;}
        function runCode(){document.getElementById('output').innerHTML='> Running...\n✅ Code executed!\n> All test cases passed!';}
        function toggleTheme(){let b=document.body,btn=document.getElementById('themeToggle');if(b.classList.contains('white-theme')){b.classList.remove('white-theme');b.classList.add('black-theme');btn.innerHTML='☀️ Light Mode';localStorage.setItem('theme','black');}else{b.classList.remove('black-theme');b.classList.add('white-theme');btn.innerHTML='🌙 Dark Mode';localStorage.setItem('theme','white');}}
        if(localStorage.getItem('theme')==='black'){document.body.classList.remove('white-theme');document.body.classList.add('black-theme');document.getElementById('themeToggle').innerHTML='☀️ Light Mode';}
    </script>
</body>
</html>
